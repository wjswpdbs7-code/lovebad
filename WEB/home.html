<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LOVEBAD - home</title>
    <style>
        body{
            background-color: white;
                font-family: 'Apple SD Gothic Neo', 'Noto Sans KR', sans-serif;
        }
        .menu{
            margin-top: 30px;
            display: flex;
            justify-content: center;
            background-color: white;
        }
        .menu a{
            text-decoration: none;
            color: #333;
            padding: 10px 20px;
            border-radius: 20px;
            box-shadow: 0 8px 20px rgba(0, 0, 0, 0.05);
            margin: 0 10px;
            border: 2px solid orange;
        }
        .welcome{
            text-align: center;
            margin-top: 0px;
            background-color:orange;
            border-radius: 20px;
            color: #ff6600;
            box-shadow: 0 8px 20px rgba(0, 0, 0, 0.05);
        }
        .profile{
            margin-top: 30px;
            display: flex;
            justify-content: center;
            background-color: white;
        }
        .profile ul{
            list-style: none;
            background-color: white;
            padding: 20px;
            border-radius: 20px;
            color: #333;
            box-shadow: 0 8px 20px rgba(0, 0, 0, 0.05);
        }
        h1{
            margin-left: 50px;
        }
    </style>
</head>
<body>
    <h1>프로필</h1>
    <div class="welcome">
        <h1>"name"님 환영합니다!</h1>
    </div>
    <fieldset id="profile">
        <legend>프로필 정보</legend>
        <ul>
            <li>이름 : "name"</li>
            <li>멤버 번호    : "member_id"</li>
            <li>성별 : "gender"</li>
            <li>나이대 : "age"</li>
            <li>지역 : "region"</li>
            <li>급수 : "level"</li>
            <li>경험 년수 : "experience_years"</li>
            <li>자기소개 : "introduce"</li>
        </ul>
    </fieldset>
    <div class="menu">
        <img class="home" src="img/home.png" alt="홈" width="30" height="30">

        <img class="records" src="img/pen.png" alt="기록" width="30" height="30">

        <img class="game" src="img/game.png" alt="게임" width="30" height="30">
  
        <img class="setting" src="img/setting.png" alt="설정" width="30" height="30">

    </div>

</body>
</html>
