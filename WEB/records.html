<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>lovebad - records</title>
    <style>
        body {
            background-color: #f7f9fc;
            font-family: 'Apple SD Gothic Neo', 'Noto Sans KR', sans-serif;
            margin: 0;
            padding: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        h1 {
            margin-top: 30px;
            text-align: center;
            color: #ff6600;
        }

        div.records {
            margin-top: 30px;
            display: flex;
            justify-content: center;
            width: 90%;
            max-width: 600px;
            background-color: white;
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 8px 20px rgba(0, 0, 0, 0.05);
            box-sizing: border-box;
        }


        table {
            width: 100%;
            border-collapse: collapse;
            text-align: center;
        }

        th,
        td {
            padding: 12px;
            border-bottom: 1px solid #ff6600;
        }

        .menu {
            margin-top: 50px;
            display: flex;
            justify-content: space-around;
            align-items: center;
            width: 90%;
            max-width: 400px;
            background-color: white;
            padding: 15px;
            border-radius: 20px;
            box-shadow: 0 8px 20px rgba(0, 0, 0, 0.05);
        }

        .menu img {
            cursor: pointer;

        }
    </style>
</head>

<body>
    <h1>기록</h1>
    <div class="records">
        <table>
            <tbody>
                <tr>
                    <th>날짜</th>
                    <th>상대방</th>
                    <th>결과</th>
                    <th>점수</th>
                </tr>
                <tr>
                    <td>2024-01-01</td>
                    <td>홍길동</td>
                    <td>승리</td>
                    <td>21:10</td>
                </tr>
                <tr>
                    <td>2024-01-02</td>
                    <td>김철수</td>
                    <td>패배</td>
                    <td>15:21</td>
                </tr>
            </tbody>
        </table>
    </div>
    <div class="menu">
        <img class="home" src="img/home.png" alt="홈" width="30" height="30">

        <img class="records" src="img/pen.png" alt="기록" width="30" height="30">

        <img class="game" src="img/game.png" alt="게임" width="30" height="30">

        <img class="setting" src="img/setting.png" alt="설정" width="30" height="30">

    </div>
</body>

</html>
