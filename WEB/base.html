<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>{% block title %}도서 서비스{% endblock %}</title>
    <style>
        body { font-family: sans-serif; padding: 20px; max-width: 800px; margin: 0 auto; line-height: 1.6; }
        nav { background: #333; padding: 12px; margin-bottom: 20px; border-radius: 4px; }
        nav a { color: white; margin-right: 15px; text-decoration: none; font-weight: bold; }
        nav a:hover { text-decoration: underline; }
        .logout { color: #ff9999 !important; float: right; }
        input { margin-bottom: 10px; padding: 8px; width: 250px; display: block; }
        button { padding: 8px 15px; cursor: pointer; background: #007bff; color: white; border: none; border-radius: 4px; }
        button:hover { background: #0056b3; }
        .welcome-msg { text-align: right; margin-bottom: 15px; color: #555; }
    </style>
</head>
<body>

    {% if session.get('logged_in') %}
    <nav>
        <a href="/books">전체 도서 목록</a>
        <a href="/add_book">새 도서 등록</a>
        <a href="/my_orders">나의 주문 내역</a>
        <a href="/logout" class="logout">로그아웃</a>
    </nav>
    <div class="welcome-msg">
        <strong>{{ session.get('name') }}</strong>님 환영합니다!
    </div>
    {% endif %}

    <div class="container">
        {% block content %}
        {% endblock %}
    </div>

</body>
</html>
